<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Enxoval" />
<meta name="theme-color" content="#f2f2f7" />
<title>O Meu Enxoval</title>
<link rel="manifest" href="manifest.json" />

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --ios-bg:#f2f2f7;--ios-card:#ffffff;--ios-blue:#007aff;--ios-red:#ff3b30;
  --ios-green:#34c759;--ios-gray:#8e8e93;--ios-sep:rgba(60,60,67,0.12);
  --ios-label:#000000;--ios-secondary:rgba(60,60,67,0.6);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;font-family:var(--font);background:var(--ios-bg);color:var(--ios-label);overflow-x:hidden}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--ios-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity 0.4s}
#splash .splash-icon{width:80px;height:80px;background:var(--ios-blue);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:16px;box-shadow:0 8px 24px rgba(0,122,255,0.3)}
#splash h1{font-size:24px;font-weight:700;margin-bottom:6px}
#splash p{font-size:14px;color:var(--ios-gray)}
#splash.hidden{opacity:0;pointer-events:none}

.app{max-width:430px;margin:0 auto;min-height:100vh;position:relative;overflow-x:hidden}

/* NAV */
.nav-bar{background:rgba(242,242,247,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:4px 20px 12px;position:sticky;top:0;z-index:10;border-bottom:0.5px solid var(--ios-sep)}
.nav-top{display:flex;align-items:flex-start;justify-content:space-between}
.nav-bar h1{font-size:34px;font-weight:700;letter-spacing:-0.5px}
.sync-indicator{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ios-gray);margin-top:12px;padding:4px 8px;background:var(--ios-card);border-radius:20px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ios-green)}
.sync-dot.syncing{background:var(--ios-blue);animation:pulse 1s infinite}
.sync-dot.error{background:var(--ios-red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* resto do CSS mantém-se igual... */
</style>
</head>

<body>

<div id="splash">
  <div class="splash-icon">🏠</div>
  <h1>O Meu Enxoval</h1>
  <p>A sincronizar...</p>
</div>

<div class="app">

  <!-- STATUS BAR REMOVIDA ✅ -->

  <div class="nav-bar">
    <div class="nav-top">
      <h1>O Meu Enxoval</h1>
      <div class="sync-indicator" id="sync-indicator">
        <div class="sync-dot syncing" id="sync-dot"></div>
        <span id="sync-text">A ligar...</span>
      </div>
    </div>
  </div>

  <!-- resto do HTML mantém-se igual -->
